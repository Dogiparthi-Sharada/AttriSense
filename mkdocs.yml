site_name: AttriSense
site_description: Explainable, fair, resilient workforce retention analytics
site_author: AttriSense contributors
repo_url: https://github.com/Dogiparthi-Sharada/AttriSense
repo_name: Dogiparthi-Sharada/AttriSense
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architecture:
      - Overview: architecture/overview.md
      - Data flow: architecture/data-flow.md
      - ML pipeline: architecture/ml-pipeline.md
      - Tech stack: architecture/tech-stack.md
  - Features:
      - Executive dashboard: features/executive-dashboard.md
      - SHAP insights: features/shap-insights.md
      - Compare employees: features/compare-employees.md
      - Causal uplift: features/causal-uplift.md
      - Fairness audit: features/fairness-audit.md
      - AI assistant: features/ai-assistant.md
      - NL→SQL eval: features/nl-sql-eval.md
      - Multilingual RAG: features/multilingual-rag.md
      - Alert mock: features/alert-mock.md
  - Learn:
      - Index: learn/index.md
      - SHAP: learn/shap.md
      - SMOTE: learn/smote.md
      - Cox PH: learn/cox-ph.md
      - Causal uplift: learn/causal-uplift.md
      - RAG: learn/rag.md
      - Fairness: learn/fairness.md
      - NL→SQL: learn/nl-sql.md
  - Design:
      - Decisions: design/decisions.md
      - Why this stack: design/why-this-stack.md
      - Trade-offs: design/trade-offs.md
  - Operations:
      - Installation: operations/installation.md
      - Configuration: operations/configuration.md
      - Secrets: operations/secrets.md
      - Docker: operations/docker.md
      - CI/CD: operations/ci-cd.md
  - Reference:
      - Data schema: reference/data-schema.md
      - API: reference/api.md
      - NL→SQL gold questions: reference/nl-sql-gold-questions.md
      - Make targets: reference/make-targets.md
  - Ethics:
      - Model card: ethics/model-card.md
      - Fairness policy: ethics/fairness-policy.md
      - Intended use: ethics/intended-use.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Glossary: glossary.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md
